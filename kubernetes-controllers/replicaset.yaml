apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-replicaset
  labels:
    app: nginx
    tier: frontend
spec:
  # modify replicas according to your case
  replicas: 3
  selector:
    matchLabels:
      tier: frontend
  template:
    metadata:
      labels:
        tier: frontend
    spec:
      initContainers:
        - name: init-download-index
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Downloading HTML page from https://httpbin.org/html..."
              wget -O /init/index.html https://httpbin.org/html
              echo "Download completed: $(cat /init/index.html | head -n 1)"
          volumeMounts:
            - name: homework-volume
              mountPath: /init
      containers:
        - name: nginx
          image: nginx:stable-alpine3.23
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: homework-volume
              mountPath: /homework
          command:
            - sh
            - -c
            - |
              echo "server {
                listen 8000;
                server_name localhost;
                root /homework;
                index index.html;
              }" > /etc/nginx/conf.d/homework.conf
              nginx -g "daemon off;"
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    echo "Removing index.html from /homework before termination..."
                    rm -f /homework/index.html
                    echo "File /homework/index.html deleted."
      volumes:
        - name: homework-volume
          emptyDir: {}
